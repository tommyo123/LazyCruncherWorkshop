name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.9.0)'
        required: true
        default: '0.9.0'
      create_release:
        description: 'Create GitHub release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $fullVersion = "${{ github.event.inputs.version }}"
          } else {
            $fullVersion = "${{ github.ref_name }}"
          }
          $fullVersion = $fullVersion -replace '^v', ''
          if ($fullVersion -match '^(\d+\.\d+\.\d+)') {
            $wixVersion = $matches[1] + '.0'
          } else {
            $wixVersion = '0.9.0.0'
          }
          echo "VERSION=$fullVersion" >> $env:GITHUB_ENV
          echo "WIX_VERSION=$wixVersion" >> $env:GITHUB_ENV
          Write-Host "Full version: $fullVersion"
          Write-Host "WiX version: $wixVersion"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Release
        run: cargo build --release

      - name: Verify binary exists
        run: |
          if (-not (Test-Path "target\release\lazy-cruncher-workshop.exe")) {
            Write-Error "lazy-cruncher-workshop.exe not found!"
            exit 1
          }
          Write-Host "OK: lazy-cruncher-workshop.exe found"

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          $wixBin = Get-ChildItem "${env:ProgramFiles(x86)}" -Recurse -Filter candle.exe |
            Select-Object -First 1 -ExpandProperty DirectoryName
          if (-not $wixBin) {
            throw "WiX candle.exe not found after installation"
          }
          Add-Content $env:GITHUB_PATH $wixBin

      - name: Build MSI
        run: |
          candle.exe -nologo -ext WixUIExtension -ext WixUtilExtension `
            -dCargoTargetBinDir=target\release `
            -dVersion="${{ env.WIX_VERSION }}" `
            wix\main.wxs
          light.exe -nologo -ext WixUIExtension -ext WixUtilExtension `
            -sval -spdb `
            -out lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-windows.msi `
            main.wixobj

      - name: Create Portable Package
        run: |
          New-Item -ItemType Directory -Force -Path portable-package
          Copy-Item target\release\lazy-cruncher-workshop.exe portable-package\
          Copy-Item external-utils\vcruntime140.dll portable-package\
          Copy-Item README.md portable-package\
          Copy-Item LICENSE portable-package\

          @"
          LazyCruncher Workshop - Portable Edition
          ========================================

          Version: ${{ env.VERSION }}

          This is a portable version that requires no installation.

          INCLUDED FILES:
          - lazy-cruncher-workshop.exe   (the application)
          - vcruntime140.dll             (runtime library)
          - README.md                    (documentation)
          - LICENSE                      (MIT License)

          HOW TO USE:
          1. Extract this ZIP file to any folder you like
          2. Run lazy-cruncher-workshop.exe
          3. Done!

          REQUIREMENTS:
          - Windows 10 or later (64-bit)
          - Visual C++ Redistributable 2015-2022
            (included as vcruntime140.dll if not already installed)

          To completely remove: just delete the extracted folder.
          "@ | Out-File -FilePath portable-package\README-PORTABLE.txt -Encoding UTF8

          Compress-Archive -Force -Path portable-package\* `
            -DestinationPath lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-windows-portable.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: |
            lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-windows.msi
            lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-windows-portable.zip
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies (egui + rfd)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Release
        run: cargo build --release

      - name: Verify binary exists
        run: |
          if [ ! -f "target/release/lazy-cruncher-workshop" ]; then
            echo "Error: lazy-cruncher-workshop not found!"
            exit 1
          fi
          echo "OK: lazy-cruncher-workshop found"

      - name: Create tar.gz package
        run: |
          mkdir -p package
          cp target/release/lazy-cruncher-workshop package/
          cp README.md package/
          cp LICENSE package/

          cat > package/README-LINUX.txt << 'EOF'
          LazyCruncher Workshop - Linux Edition
          =====================================

          HOW TO USE:
          1. Extract this archive
          2. chmod +x lazy-cruncher-workshop
          3. Run: ./lazy-cruncher-workshop
          EOF

          cd package
          tar -czf ../lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-linux.tar.gz *

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-release
          path: lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-linux.tar.gz
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Release
        run: cargo build --release

      - name: Verify binary exists
        run: |
          if [ ! -f "target/release/lazy-cruncher-workshop" ]; then
            echo "Error: lazy-cruncher-workshop not found!"
            exit 1
          fi
          echo "OK: lazy-cruncher-workshop found"

      - name: Create tar.gz package
        run: |
          mkdir -p package
          cp target/release/lazy-cruncher-workshop package/
          cp README.md package/
          cp LICENSE package/

          cat > package/README-MACOS.txt << 'EOF'
          LazyCruncher Workshop - macOS Edition
          =====================================

          HOW TO USE:
          1. Extract this archive
          2. chmod +x lazy-cruncher-workshop
          3. Run: ./lazy-cruncher-workshop

          SECURITY WARNING:
          If you get a security warning, go to System Settings > Privacy & Security
          and allow the application to run.
          EOF

          cd package
          tar -czf ../lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-macos.tar.gz *

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-release
          path: lazy-cruncher-workshop-${{ env.VERSION }}-x86_64-macos.tar.gz
          retention-days: 7

  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-release/*
            linux-release/*
            macos-release/*
          body: |
            ## LazyCruncher Workshop ${{ env.VERSION }}

            A desktop tool that packs one or more Commodore 64 `.prg` files into a
            single self-extracting, crunched `.prg`.

            ### Installation

            **Windows:**
            - **MSI Installer (recommended):** installs to Program Files with Desktop
              and Start Menu shortcuts. The Visual C++ runtime is installed only if it
              is missing.
            - **Portable ZIP:** extract and run anywhere; the runtime DLL is included.

            **Linux / macOS:**
            - **tar.gz:** extract and run the binary directly.

            ### Windows Security Warning

            Windows may show a SmartScreen warning because the installer is not
            code-signed. Click "More info" then "Run anyway".
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
